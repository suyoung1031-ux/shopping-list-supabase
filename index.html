<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      width: 100%;
      max-width: 480px;
      padding: 32px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 24px;
    }
    h1 span { color: #4f46e5; }

    /* 입력 영역 */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
      color: #1a202c;
    }
    .input-row input:focus { border-color: #4f46e5; }
    .input-row input::placeholder { color: #a0aec0; }

    .btn-add {
      padding: 12px 20px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: background .2s, transform .1s;
      line-height: 1;
    }
    .btn-add:hover { background: #4338ca; }
    .btn-add:active { transform: scale(.95); }
    .btn-add:disabled { background: #a5b4fc; cursor: not-allowed; }

    /* 필터 버튼 */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .filters button {
      flex: 1;
      padding: 8px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: transparent;
      font-size: .85rem;
      color: #718096;
      cursor: pointer;
      transition: all .15s;
    }
    .filters button.active {
      border-color: #4f46e5;
      background: #4f46e5;
      color: #fff;
      font-weight: 600;
    }

    /* 아이템 수 요약 */
    .summary {
      font-size: .85rem;
      color: #a0aec0;
      margin-bottom: 12px;
    }

    /* 리스트 */
    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #f7f8fc;
      border-radius: 10px;
      border: 2px solid transparent;
      transition: border-color .15s, opacity .15s;
      animation: slideIn .2s ease;
    }
    li.done {
      opacity: .55;
      background: #f0fdf4;
      border-color: #d1fae5;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 체크박스 */
    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* 아이템 이름 */
    .item-name {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-all;
    }
    li.done .item-name {
      text-decoration: line-through;
      color: #a0aec0;
    }

    /* 삭제 버튼 */
    .btn-del {
      background: transparent;
      border: none;
      color: #cbd5e0;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color .15s, background .15s;
      flex-shrink: 0;
    }
    .btn-del:hover { color: #e53e3e; background: #fff5f5; }

    /* 빈 상태 */
    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: .95rem;
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 8px; }

    /* 전체 삭제 */
    .clear-done {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      border: 2px solid #fed7d7;
      border-radius: 10px;
      background: transparent;
      color: #e53e3e;
      font-size: .9rem;
      cursor: pointer;
      transition: all .15s;
      display: none;
    }
    .clear-done:hover { background: #fff5f5; }
    .clear-done.visible { display: block; }

    /* 로딩 상태 */
    .loading {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: .95rem;
    }

    /* 에러 상태 */
    .error-msg {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      color: #e53e3e;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: .85rem;
      margin-bottom: 12px;
      display: none;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>
<div class="card">
  <h1>🛒 쇼핑 <span>리스트</span></h1>

  <div class="input-row">
    <input id="input" type="text" placeholder="아이템을 입력하세요..." maxlength="60" />
    <button class="btn-add" id="addBtn" title="추가">+</button>
  </div>

  <div class="filters">
    <button class="active" data-filter="all">전체</button>
    <button data-filter="active">미완료</button>
    <button data-filter="done">완료</button>
  </div>

  <p class="summary" id="summary"></p>
  <div class="error-msg" id="errorMsg"></div>

  <ul id="list"></ul>
  <div class="loading" id="loading">불러오는 중...</div>
  <div class="empty" id="empty" style="display:none">
    <div class="empty-icon">🛍️</div>
    <div>아이템이 없습니다</div>
  </div>

  <button class="clear-done" id="clearDone">완료된 항목 모두 삭제</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://cdvquixykqciwqneitff.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkdnF1aXh5a3FjaXdxbmVpdGZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NDg2MDQsImV4cCI6MjA5ODIyNDYwNH0.lQDHIFXECK00m4zgXyxVT9j8Yr4sA0Lt18-3i-R8--0';

  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let items = [];
  let filter = 'all';
  let busy = false;

  const input    = document.getElementById('input');
  const addBtn   = document.getElementById('addBtn');
  const list     = document.getElementById('list');
  const emptyEl  = document.getElementById('empty');
  const loadingEl = document.getElementById('loading');
  const summary  = document.getElementById('summary');
  const clearBtn = document.getElementById('clearDone');
  const errorMsg = document.getElementById('errorMsg');

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('visible');
    setTimeout(() => errorMsg.classList.remove('visible'), 4000);
  }

  function filtered() {
    if (filter === 'active') return items.filter(i => !i.done);
    if (filter === 'done')   return items.filter(i =>  i.done);
    return items;
  }

  function render() {
    loadingEl.style.display = 'none';
    const visible = filtered();
    list.innerHTML = '';

    visible.forEach(item => {
      const li   = document.createElement('li');
      if (item.done) li.classList.add('done');

      const cb   = document.createElement('input');
      cb.type    = 'checkbox';
      cb.checked = item.done;
      cb.addEventListener('change', () => toggle(item.id));

      const name      = document.createElement('span');
      name.className  = 'item-name';
      name.textContent = item.text;

      const del       = document.createElement('button');
      del.className   = 'btn-del';
      del.textContent = '✕';
      del.title       = '삭제';
      del.addEventListener('click', () => remove(item.id));

      li.append(cb, name, del);
      list.appendChild(li);
    });

    const total = items.length;
    const done  = items.filter(i => i.done).length;
    summary.textContent = total ? `총 ${total}개 · 완료 ${done}개` : '';

    emptyEl.style.display = visible.length === 0 ? 'block' : 'none';
    clearBtn.classList.toggle('visible', done > 0);
  }

  async function loadItems() {
    const { data, error } = await db
      .from('shopping_items')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      showError('데이터를 불러오지 못했습니다.');
      loadingEl.style.display = 'none';
      return;
    }
    items = data;
    render();
  }

  async function add() {
    const text = input.value.trim();
    if (!text || busy) { input.focus(); return; }

    busy = true;
    addBtn.disabled = true;

    const { data, error } = await db
      .from('shopping_items')
      .insert({ text, done: false })
      .select()
      .single();

    busy = false;
    addBtn.disabled = false;

    if (error) { showError('추가에 실패했습니다.'); return; }
    items.unshift(data);
    input.value = '';
    render();
    input.focus();
  }

  async function toggle(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;

    const newDone = !item.done;
    item.done = newDone;
    render();

    const { error } = await db
      .from('shopping_items')
      .update({ done: newDone })
      .eq('id', id);

    if (error) {
      item.done = !newDone;
      render();
      showError('업데이트에 실패했습니다.');
    }
  }

  async function remove(id) {
    items = items.filter(i => i.id !== id);
    render();

    const { error } = await db
      .from('shopping_items')
      .delete()
      .eq('id', id);

    if (error) {
      showError('삭제에 실패했습니다.');
      await loadItems();
    }
  }

  addBtn.addEventListener('click', add);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') add(); });

  document.querySelectorAll('.filters button').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  clearBtn.addEventListener('click', async () => {
    const doneIds = items.filter(i => i.done).map(i => i.id);
    items = items.filter(i => !i.done);
    render();

    const { error } = await db
      .from('shopping_items')
      .delete()
      .in('id', doneIds);

    if (error) {
      showError('삭제에 실패했습니다.');
      await loadItems();
    }
  });

  loadItems();
</script>
</body>
</html>
